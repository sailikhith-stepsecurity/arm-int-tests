name: Agent Tracer Block ARM

on:
  workflow_dispatch:
jobs:
  job2:
    if: always()
    runs-on: ARMLinuxRunner
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481 # v2.11.0
        with:
          egress-policy: audit

      - uses: h0x0er/harden-runner@7b98eb4fa9db78b9fb0012d3ce10be8a257e1906 # int
        with:
         egress-policy: block
         agent-env: int-pull
         tls-env: agent
         allowed-endpoints: >
           google.com:80
           api.github.com:80
           github.com:80
           
           
      - run: curl -v -4 google.com
      - run: curl -v -4 api.github.com
      - run: curl -v -4 github.com
      
      - run: dig "github-action.23d6a18a-f8eb-4d21-ae92-7bbcbdd57261.dnshook.site"
