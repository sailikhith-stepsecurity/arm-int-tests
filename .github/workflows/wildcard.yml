name: 2. Exfiltration Simulation
on:
  workflow_dispatch:

permissions: {}

jobs:
  exfiltration-simulation:
    permissions:
      contents: read  # for actions/checkout to fetch code
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.13.0
        with:
          egress-policy: block
          allowed-endpoints: >
            *:443
            *:80

      - uses: actions/checkout@v3

      
      - run: curl https://8.8.8.8
         
      # Dependency Confusion DNS Exfiltration Scenario
      - name: DNS Exfiltration
        run: dig google.com
      
      # Codecov Scenario: Exfiltrate data to attacker's endpoint
      - name: Data Exfiltration To Attacker Controller Endpoint
        run: curl pastebin.com -L
