name: Disabled Telemetry ARM

on:
  workflow_dispatch:

# permissions:
#   contents: read

permissions: {}

jobs:
  disabled-telemetry:
    permissions:
      contents: read  # for actions/checkout to fetch code
    if: always()
    runs-on: ARMLinuxRunner
    steps:
      - uses: step-security/harden-runner@97bbed2426f3310cf21ffa4c69621c6307aa8a4e # rc
        with:
          egress-policy: block
          disable-sudo: true
          disable-telemetry: true
          allowed-endpoints: |
            www.google.com:443

      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - run: curl https://www.google.com
      - run: curl https://microsoft.com
      - run: curl https://youtube.com
      - run: curl https://bing.com
