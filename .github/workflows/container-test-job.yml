name: CI
on:
  workflow_dispatch:
permissions: {}

jobs:
  container-test-job:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    container:
      image: node:18
      env:
        NODE_ENV: development
      options: --cpus 1
    steps:
      - name: Check dockerenv with sudo
        run: sudo ls /.dockerenv || echo No dockerenv
