name: Enum

on:
  workflow_dispatch:

permissions: {}

jobs:
  enum:
    permissions:
      contents: read
    if: always()
    runs-on: ARMLinuxRunner
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2.13.0
        with:
          egress-policy: audit

      - name: lsm param
        run: cat /sys/kernel/security/lsm

      - run: cat /boot/config-`uname -r` | grep CONFIG_BPF_KPROBE_OVERRIDE
